<!DOCTYPE html>

<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GastroGlass HUD Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #c084fc; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020205; color: #ffffff; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        body.pb-44 { padding-bottom: 120px; }
        #view-title { color: #ffffff !important; text-shadow: 0 4px 12px rgba(0,0,0,0.5); display: block; opacity: 1; }
        .orb { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(192, 132, 252, 0.1) 0%, transparent 70%); z-index: -1; filter: blur(80px); animation: float 20s infinite alternate; }
        @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 20%); } }
        .num-key, .nav-btn, button, .glass-card { touch-action: manipulation; }
        .glass-card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 27px; transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.3s ease, opacity 0.3s ease; }
        .glass-card:not(.inactive) { border-left: 0px solid rgba(192, 132, 252, 0.7); box-shadow: inset 12px 0 18px -6px rgba(192, 132, 252, 0.40), inset 4px 0 4px -2px rgba(192, 132, 252, 0.60), -6px 0 20px -4px rgba(192, 132, 252, 0.25); }
        .inactive { opacity: 1; transform: scale(0.99); filter: grayscale(0.2); }
        .glass-card.inactive .recipe-header { opacity: 1 !important; filter: none !important; }
        .glass-card.inactive input[type="checkbox"] { opacity: 1; }
        .glass-card.inactive .recipe-title-input { color: white !important; -webkit-text-fill-color: white !important; }
        .card-divider { height: 1px; width: 100%; background: linear-gradient(to right, transparent, rgba(192, 132, 252, 0.4) 20%, rgba(192, 132, 252, 0.4) 80%, transparent); margin-top: 12px; margin-bottom: 12px; border: none; transition: background 0.3s ease; }
        .glass-card.inactive .card-divider { background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2) 20%, rgba(255, 255, 255, 0.2) 80%, transparent); }
        .hud-status { position: fixed; right: 20px; bottom: 90px; padding: 10px 22px; background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(192, 132, 252, 0.4); border-radius: 29px; z-index: 900; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border-left: 4px solid var(--primary); }
        .search-pill { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 20px; width: 100%; color: white; font-size: 14px; outline: none; transition: all 0.3s; }
        .search-pill:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .person-picker { position: fixed; right: 25px; bottom: 155px; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(192, 132, 252, 0.4); border-radius: 18px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; z-index: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: all 0.2s ease; }
        .person-picker:active { transform: scale(0.95); }
        #num-persoane-input { background: transparent; border: none; color: white; font-weight: 800; font-size: 16px; width: 15px; text-align: center; outline: none; }
        .tab-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.4); touch-action: none; }
        .nav-btn { flex: 1; padding: 15px 0; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255, 255, 255, 0.4); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px; display: flex; align-items: center; justify-content: center; }
        .nav-btn.active { color: #ffffff; background: rgba(192, 132, 252, 0.2); box-shadow: inset 0 0 15px rgba(192, 132, 252, 0.1); }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: rgba(10, 10, 15, 0.98); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-top: 1px solid var(--glass-border); z-index: 2000; transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); border-radius: 32px 32px 0 0; display: flex; flex-direction: column; }
        .bottom-sheet.active { transform: translateY(0); bottom: 0 !important; }
        .bottom-sheet.full { height: 100vh !important; height: 100dvh !important; top: 0; border-radius: 0; background: #020205; }
        .bottom-sheet .absolute.bottom-6 button { box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #product-options { flex-grow: 1; overflow-y: auto; padding: 0 20px 120px 20px; scrollbar-width: none; }
        #product-options::-webkit-scrollbar { display: none; }
        #number-picker { background: rgba(15, 15, 25, 0.95); border-top: 2px solid var(--primary); padding-bottom: env(safe-area-inset-bottom); }
        #number-picker.active { bottom: 0; }
        .num-key { height: 60px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; font-size: 1.25rem; font-weight: 700; transition: all 0.1s ease; display: flex; align-items: center; justify-content: center; }
        .num-key:active { background: var(--primary); color: black; transform: scale(0.92); }
        #lock-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; cursor: pointer; transition: all 0.3s ease; flex-shrink: 0; }
        #lock-btn:active { transform: scale(0.9); }
        #lock-btn.unlocked { background: rgba(192, 132, 252, 0.15); border-color: rgba(192, 132, 252, 0.4); }
        .locked-only { display: none !important; }
        body.unlocked .locked-only { display: flex !important; }
        .locked-only-block { display: none !important; }
        body.unlocked .locked-only-block { display: block !important; }
        .locked-only-inline { display: none !important; }
        body.unlocked .locked-only-inline { display: inline-block !important; }
        .qty-btn-locked { pointer-events: none; opacity: 0.6; }
        body.unlocked .qty-btn-locked { pointer-events: auto; opacity: 1; }
        .ore-locked { pointer-events: none; cursor: default; }
        body.unlocked .ore-locked { pointer-events: auto; cursor: pointer; }
        .pret-input-locked { pointer-events: none; }
        body.unlocked .pret-input-locked { pointer-events: auto; }
        .recipe-content-wrapper { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-height: 2000px; opacity: 1; overflow: hidden; }
        body.collapsed-active .recipe-content-wrapper { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
        #collapse-btn svg { transition: transform 0.3s ease; transform: rotate(0deg); }
        body.collapsed-active #collapse-btn svg { transform: rotate(180deg); }
    </style>
</head>

<body class="pb-44">

<!-- 1. SHEET LISTA CUMPĂRĂTURI -->

<div class="orb"></div>

<div class="p-6 max-w-lg mx-auto">
<header class="mb-10 pt-4">
    <div class="flex items-center justify-between">
        <div>
            <h1 id="view-title" class="text-4xl font-extrabold tracking-tighter">Planificator</h1>

        </div>
        <div class="flex items-center gap-2">
            <button id="collapse-btn" onclick="toggleCollapseAll()"

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
            <button id="bulk-select-btn" onclick="toggleSelectAll()"

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
            </button>
            <button id="lock-btn" onclick="toggleLock()">
                <svg id="icon-locked" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #6b7280;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>

                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>

        </div>
    </div>
</header>

    <div id="search-container" class="mb-6">
        <div class="relative flex items-center">
            <input type="text" id="main-search" oninput="updateSearch(this.value)" placeholder="Caută în meniu..." 
                   class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 pr-12 text-sm font-semibold text-white placeholder:text-gray-600 focus:outline-none focus:border-purple-500/50 transition-all">
            <button id="clear-search" onclick="clearSearch()"

        </div>
    </div>

    <div id="page-home" class="space-y-6">
        <div id="recipes-list" class="space-y-6"></div>
        <button onclick="addRecipe()" class="locked-only-block w-full py-5 glass-card border-dashed border-2 border-white/10 text-gray-400 font-black text-xs tracking-widest uppercase">+ Adaugă Meniu Nou</button>

</div>

<input type="tel" id="hidden-password-input" style="position:absolute; opacity:0; pointer-events:none; top:0;" maxlength="4">

<div class="person-picker" onclick="document.getElementById('num-persoane-input').focus()">

</div>

<!-- NUMBER PICKER -->
<div id="number-picker" class="bottom-sheet">

    <div class="px-6 mb-2 flex justify-between items-center">
        <h3 id="num-picker-title" class="text-[10px] font-black uppercase tracking-[2px] text-purple-400">Introduceți Cantitatea</h3>

<!-- PRODUCT PICKER -->

            <h3 class="text-xl font-black tracking-tighter">SELECTEAZĂ PRODUS</h3>
            <p class="text-[9px] font-bold text-purple-400 uppercase tracking-[2px]">Alege din catalogul de prețuri</p>

    <div class="absolute bottom-8 left-0 w-full px-6 pointer-events-none">
        <button onclick="closeSheets()" class="pointer-events-auto w-full py-4 bg-purple-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-purple-500/40">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const USE_SUPABASE = true;
const SUPABASE_URL = 'https://fndjrfieitieqzafhyzz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bHDKjiKAVHqW199ICw7i2g_O3olYMAr';
const supabaseClient = USE_SUPABASE ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let searchTerm = "";
let isUnlocked = false;
let scrollPositions = { home: 0, catalog: 0 };
let currentTab = 'home';
let isCollapsed = false;

let catalog = [
    { id: 'c1', nume: 'Icre roșii', pretLei: 761.00, unit: 'Kg' },
    { id: 'c2', nume: 'Pătrunjel', pretLei: 148.75, unit: 'Kg' },
    { id: 'c3', nume: 'Usturoi granulat', pretLei: 86.00, unit: 'Kg' },
    { id: 'c59', nume: 'Ouă (L)', pretLei: 1.25, unit: 'buc' }
];

let retete = [
    {
        id: 1, selectat: true, nume: '🍳 Mic Dejun Proteic',
        ore: 4, portii: 2, ingrediente: [{ idProd: 'c59', qty: 4 }], tags: 'oua, proteina, rapid'
    }
];

let activeCtx = null;
let lastEditedId = null;

// ============================================================
// AUCHAN LINK HELPER
// ============================================================

function stripEmojisAndTrim(text) {
    return text
        .replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function buildAuchanUrl(numeProdus) {
    const curat = stripEmojisAndTrim(numeProdus);
    const encoded = encodeURIComponent(curat);
    return `https://www.auchan.ro/${encoded}?_q=${encoded}&map=ft`;
}

function openAuchan(numeProdus) {
    window.open(buildAuchanUrl(numeProdus), '_blank');
}

// ============================================================

function toggleCollapseAll() {
    isCollapsed = !isCollapsed;
    document.body.classList.toggle('collapsed-active', isCollapsed);
}

function handleCardClick(event, rIdx) {
    if (isUnlocked) return;
    const target = event.target;
    const isPortiiZone = target.closest('[onclick*="openNumPicker"][onclick*="portii"]');
    if (isPortiiZone || target.type === 'checkbox') return;
    toggleSelectReteta(rIdx, !retete[rIdx].selectat);
}

let lastScrollPos = 0;

function prepareInput(input) {
    lastScrollPos = window.scrollY;
    input.value = '';
    setTimeout(() => window.scrollTo(0, lastScrollPos), 10);
}

function validarePersoane(input) {
    let val = input.value.replace(/[^1-9]/g, '');
    if (val !== "") { input.value = val; input.blur(); }
}

async function resetDacaEGol(input) {
    if (input.value.trim() === "" || input.value === "0") input.value = "1";
    await db_saveNumPersoane(input.value);
    setTimeout(() => { window.scrollTo({ top: lastScrollPos, behavior: 'smooth' }); render(); }, 50);
}

async function toggleSelectAll() {
    if (retete.length === 0) return;
    const allSel = retete.every(r => r.selectat);
    retete.forEach(r => r.selectat = !allSel);
    render();
    if (USE_SUPABASE) {
        try { await Promise.all(retete.map(r => db_upsertReteta(r))); }
        catch (err) { console.error("Eroare salvare stare globală:", err); }
    }
}

let currentNumInput = "0";

function openNumPicker(rIdx, type, iIdx = null) {
    activeCtx = { rIdx, type, iIdx };
    currentNumInput = "0";
    const title = document.getElementById('num-picker-title');
    const unitDisp = document.getElementById('num-unit-display');
    if (type === 'ingQty') {
        const prod = catalog.find(p => p.id === retete[rIdx].ingrediente[iIdx].idProd);
        title.innerText = "Cantitate Ingredient";
        unitDisp.innerText = prod ? prod.unit : 'unit';
    } else if (type === 'ore') {
        title.innerText = "Ore per Masă"; unitDisp.innerText = "h";
    } else {
        title.innerText = "Număr Porții"; unitDisp.innerText = "buc";
    }
    updateNumDisplay();
    document.getElementById('number-picker').classList.add('active');
}

function pressNum(val) {
    if (val === 'back') currentNumInput = currentNumInput.length > 1 ? currentNumInput.slice(0, -1) : "0";
    else if (val === '.') { if (!currentNumInput.includes('.')) currentNumInput += '.'; }
    else { if (currentNumInput === "0") currentNumInput = val; else currentNumInput += val; }
    updateNumDisplay();
}

function updateNumDisplay() {
    document.getElementById('num-display').innerText = currentNumInput;
}

async function confirmNum() {
    let finalVal = parseFloat(currentNumInput) || 0;
    const ctx = activeCtx;
    if (!ctx) return;
    if ((ctx.type === 'portii' || ctx.type === 'ore') && finalVal < 1) finalVal = 1;
    if (ctx.type === 'ore') retete[ctx.rIdx].ore = finalVal;
    else if (ctx.type === 'portii') retete[ctx.rIdx].portii = Math.round(finalVal);
    else if (ctx.type === 'ingQty') retete[ctx.rIdx].ingrediente[ctx.iIdx].qty = finalVal;
    lastEditedId = retete[ctx.rIdx].id;
    closeSheets();
    render();
    if (USE_SUPABASE) db_upsertReteta(retete[ctx.rIdx]).catch(err => console.error("Eroare salvare:", err));
    currentNumInput = "0";
}

async function db_saveNumPersoane(val) {

}

async function db_loadNumPersoane() {

    const { data } = await supabaseClient.from('setari').select('valoare').eq('id', 'num_persoane').single();
    if (data) document.getElementById('num-persoane-input').value = data.valoare;
}

async function db_loadCatalog() {
    if (!USE_SUPABASE) return;
    const { data, error } = await supabaseClient.from('catalog').select('*');
    if (error) { console.error('Eroare catalog:', error); return; }
    catalog = data.map(r => ({ id: r.id, nume: r.nume, pretLei: parseFloat(r.pretLei), unit: r.unit }));
}

async function db_upsertCatalogItem(prod) {
    if (!USE_SUPABASE) return;
    await supabaseClient.from('catalog').upsert({ id: prod.id, nume: prod.nume, pretLei: prod.pretLei, unit: prod.unit });
}

async function db_loadRetete() {
    if (!USE_SUPABASE) return;
    const { data, error } = await supabaseClient.from('retete').select('*');
    if (error) { console.error('Eroare retete:', error); return; }
    retete = data.map(r => ({ id: r.id, nume: r.nume, ore: r.ore, portii: r.portii, tags: r.tags || '', selectat: r.selectat, ingrediente: r.ingrediente || [] }));
}

async function db_deleteCatalogItem(id) {
    if (!USE_SUPABASE) return;
    await supabaseClient.from('catalog').delete().eq('id', id);
}

async function db_upsertReteta(reteta) {
    if (!USE_SUPABASE) return;
    const payload = { nume: reteta.nume, ore: reteta.ore, portii: reteta.portii, tags: reteta.tags || '', selectat: reteta.selectat, ingrediente: reteta.ingrediente };
    if (typeof reteta.id === 'number' && reteta.id > 1000000000) {
        const { data, error } = await supabaseClient.from('retete').insert(payload).select().single();
        if (error) { console.error('Eroare inserare rețetă:', error); return; }
        reteta.id = data.id;
    } else {
        await supabaseClient.from('retete').update(payload).eq('id', reteta.id);
    }
}

async function db_deleteReteta(id) {
    if (!USE_SUPABASE) return;
    await supabaseClient.from('retete').delete().eq('id', id);
}

function toggleLock() {
    if (isUnlocked) { applyLockState(false); return; }
    const hiddenInput = document.getElementById('hidden-password-input');
    hiddenInput.value = ""; hiddenInput.focus();
    hiddenInput.oninput = function() {
        if (this.value.length === 4) {
            if (this.value === "4579") { applyLockState(true); this.blur(); }
            else { alert("Cod incorect!"); this.value = ""; }
        }
    };
}

function applyLockState(shouldUnlock) {
    isUnlocked = shouldUnlock;
    const body = document.body;
    const btn = document.getElementById('lock-btn');
    if (isUnlocked) {
        body.classList.add('unlocked'); btn.classList.add('unlocked');
        document.getElementById('icon-locked').style.display = 'none';
        document.getElementById('icon-unlocked').style.display = 'block';
    } else {
        body.classList.remove('unlocked'); btn.classList.remove('unlocked');
        document.getElementById('icon-locked').style.display = 'block';
        document.getElementById('icon-unlocked').style.display = 'none';
    }
    render();
}

function openShoppingList() {
    const listContent = document.getElementById('shopping-list-content');
    const summaryCount = document.getElementById('shopping-summary-count');
    listContent.innerHTML = '';

    let cumparaturi = {};
    let detaliiCalcul = {};

    retete.forEach(r => {
        if (r.selectat) {
            r.ingrediente.forEach(ing => {
                if (!ing.idProd) return;
                const qtyReteta = ing.qty;
                const nrPortii = r.portii;
                const qtyTotalaMeniu = qtyReteta * nrPortii;
                const produs = catalog.find(p => p.id === ing.idProd);
                const unit = produs ? produs.unit : '';
                const textLinie = `${r.nume}:\n${Number(qtyReteta.toFixed(3))} ${unit} x ${nrPortii} porții = ${Number(qtyTotalaMeniu.toFixed(3))} ${unit}`;
                if (cumparaturi[ing.idProd]) {
                    cumparaturi[ing.idProd] += qtyTotalaMeniu;
                    detaliiCalcul[ing.idProd].push(textLinie);
                } else {
                    cumparaturi[ing.idProd] = qtyTotalaMeniu;
                    detaliiCalcul[ing.idProd] = [textLinie];
                }
            });
        }
    });

    const sortableItems = Object.keys(cumparaturi).map(id => {
        const produs = catalog.find(p => p.id === id);
        return { id, totalQty: cumparaturi[id], calcule: detaliiCalcul[id], unitDisplay: produs ? produs.unit : '' };
    }).sort((a, b) => {
        const unitA = (a.unitDisplay || '').toLowerCase().replace(/[^a-z]/g, '');
        const unitB = (b.unitDisplay || '').toLowerCase().replace(/[^a-z]/g, '');
        const prioritati = { 'kg': 6, 'l': 5, 'g': 4, 'ml': 3, 'leg': 2, 'buc': 1 };
        const pA = prioritati[unitA] || 0, pB = prioritati[unitB] || 0;
        if (pB !== pA) return pB - pA;
        if (pA === 0 && pB === 0 && unitA !== unitB) return unitA.localeCompare(unitB);
        if (b.totalQty !== a.totalQty) return b.totalQty - a.totalQty;
        const nA = catalog.find(x => x.id === a.id)?.nume || '';
        const nB = catalog.find(x => x.id === b.id)?.nume || '';
        return nA.localeCompare(nB);
    });

    summaryCount.innerText = `${sortableItems.length} PRODUSE UNICE`;

    if (sortableItems.length === 0) {
        listContent.innerHTML = '<p class="text-center text-gray-500 py-10 font-bold uppercase text-xs tracking-widest">Nicio rețetă selectată</p>';
    } else {
        sortableItems.forEach(item => {
            const pReal = catalog.find(x => x.id === item.id);
            if (!pReal) return;
            const pretTotalLei = pReal.pretLei * item.totalQty;

            const textDialog = `PRODUS: ${pReal.nume}\n----------------------------\n\n` +
                item.calcule.join('\n\n') +
                `\n\n----------------------------\nTOTAL GENERAL: ${Number(item.totalQty.toFixed(3))} ${item.unitDisplay}`;

            const countMeniuri = item.calcule.length;
            const numeEscaped = pReal.nume.replace(/'/g, "\\'").replace(/`/g, '\\`');

            listContent.innerHTML += `
                <div class="glass-card p-4 flex justify-between items-center border-l-4 border-purple-500 gap-3">
                    <div class="min-w-0 flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <span onclick="event.stopPropagation(); alert(\`${textDialog}\`)"
                                  class="flex-shrink-0 bg-white/10 text-white px-2 py-0.5 rounded-md text-[11px] font-black border border-white/5 uppercase cursor-pointer active:scale-95 transition-transform select-none">
                                ${Number(item.totalQty.toFixed(3))} ${item.unitDisplay}
                            </span>
                            <p onclick="openAuchan('${numeEscaped}')" 
                               class="font-bold text-white text-sm truncate cursor-pointer active:opacity-70 transition-opacity">
                                ${pReal.nume}
                            </p>
                            ${countMeniuri > 1 ? `<span class="w-5 h-5 flex items-center justify-center bg-emerald-500/20 text-emerald-400 rounded-full text-[10px] font-black border border-emerald-500/30">${countMeniuri}</span>` : ''}
                        </div>
                        <div class="flex items-center gap-1 ml-1">
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-tight">
                                ${pReal.pretLei.toFixed(2)} LEI / ${item.unitDisplay}
                            </p>
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="text-base font-black text-white leading-none">${pretTotalLei.toFixed(2)} LEI</p>
                    </div>
                </div>`;
        });
    }

    document.getElementById('shopping-sheet').classList.add('active');
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/ț/g, "t").replace(/ș/g, "s").replace(/ă/g, "a").replace(/â/g, "a").replace(/î/g, "i");
}

function updateSearch(val) {
    searchTerm = normalizeText(val);
    const clearBtn = document.getElementById('clear-search');
    if (val.length > 0) clearBtn.classList.remove('hidden');
    else clearBtn.classList.add('hidden');
    render();
}

function clearSearch() {
    const input = document.getElementById('main-search');
    input.value = ""; updateSearch(""); input.focus();
}

function switchTab(tab) {
    if (currentTab === tab) return;
    scrollPositions[currentTab] = window.scrollY;
    document.getElementById('page-home').classList.toggle('hidden', tab !== 'home');
    document.getElementById('page-catalog').classList.toggle('hidden', tab !== 'catalog');
    const searchBar = document.getElementById('search-container');
    if (searchBar) searchBar.classList.toggle('hidden', tab !== 'home');
    document.getElementById('nav-home').classList.toggle('active', tab === 'home');
    document.getElementById('nav-catalog').classList.toggle('active', tab === 'catalog');
    document.getElementById('view-title').innerText = tab === 'home' ? 'Planificator' : 'Catalog';
    currentTab = tab;
    render();
    setTimeout(() => window.scrollTo({ top: scrollPositions[tab] || 0, behavior: 'instant' }), 10);
}

// ============================================================

function render() {
    const list = document.getElementById('recipes-list');
    if (!list) return;
    list.innerHTML = '';
    let tLei = 0, tOre = 0;

    const nrPers = parseInt(document.getElementById('num-persoane-input').value) || 1;

    retete.forEach(r => {
        let costLeiMasa = 0;
        r.ingrediente.forEach(ing => {
            const p = catalog.find(x => x.id === ing.idProd);
            if (p) costLeiMasa += p.pretLei * ing.qty;
        });
        r.costLeiCalculat = costLeiMasa * r.portii;
        r.totalOreCalculat = r.ore * r.portii;
        r.eficienta = r.costLeiCalculat > 0 ? r.totalOreCalculat / r.costLeiCalculat : 0;
        if (r.selectat) { tLei += r.costLeiCalculat; tOre += r.totalOreCalculat; }
    });

    const reteteFiltrate = retete
        .filter(r => {
            const nNume = normalizeText(r.nume);
            const nTags = normalizeText(r.tags || "");
            return nNume.includes(searchTerm) || nTags.includes(searchTerm);
        })
        .sort((a, b) => b.eficienta - a.eficienta);

    reteteFiltrate.forEach((reteta) => {
        const rIdx = retete.findIndex(r => r.id === reteta.id);
        const oreCls = isUnlocked ? 'cursor-pointer' : 'ore-locked cursor-default';
        const textLockCls = isUnlocked ? '' : 'pointer-events-none';

        list.innerHTML += `
            <div id="recipe-${reteta.id}" 
                 onclick="handleCardClick(event, ${rIdx})"
                 class="glass-card p-5 relative transition-all duration-300 ${reteta.selectat ? '' : 'inactive'}">
                
                <div class="flex items-center gap-4 mb-1">
                    <input type="checkbox" ${reteta.selectat ? 'checked' : ''} 
                           onchange="toggleSelectReteta(${rIdx}, this.checked)" 
                           class="w-6 h-6 accent-purple-500">
                    <input class="font-extrabold text-xl flex-grow text-white bg-transparent outline-none border-none ${textLockCls}" 
                           value="${reteta.nume}" ${isUnlocked ? '' : 'readonly'}
                           onchange="updateRetetaField(${rIdx}, 'nume', this.value)">
                </div>
                
                <div class="recipe-content-wrapper">
                    <div class="flex items-center gap-2 mb-4 ml-10">
                        <span class="text-purple-500 font-bold text-[10px]">#</span>
                        <input class="text-[10px] font-bold text-gray-500 bg-transparent border-none outline-none w-full uppercase tracking-widest ${textLockCls}" 
                               placeholder="taguri..."
                               value="${reteta.tags || ''}" ${isUnlocked ? '' : 'readonly'}
                               onchange="updateRetetaField(${rIdx}, 'tags', this.value)">
                    </div>

                    <div class="space-y-2 mb-4">
                        ${reteta.ingrediente.map((ing, iIdx) => {
                            const p = catalog.find(x => x.id === ing.idProd);
                            const qtyCurat = Number(parseFloat(ing.qty).toFixed(3));
                            return `
                            <div class="flex items-center gap-2 bg-white/5 p-2 pr-3 rounded-2xl border border-white/5">
                                ${isUnlocked ? `
                                <button onclick="openProductPicker(${rIdx}, ${iIdx})" class="flex-grow text-left text-xs font-semibold text-gray-200 truncate pl-2">
                                    ${p ? p.nume : 'Alege Produs...'}
                                </button>` : `
                                <span class="flex-grow text-left text-xs font-semibold text-gray-200 truncate pl-2">
                                    ${p ? p.nume : 'Alege Produs...'}
                                </span>`}
                                <button onclick="${isUnlocked ? `openNumPicker(${rIdx}, 'ingQty', ${iIdx})` : ''}" 
                                        class="bg-purple-500/20 text-purple-300 px-3 py-1 rounded-xl text-[10px] font-black min-w-[55px] ${isUnlocked ? '' : 'opacity-60 cursor-default'}">
                                    ${qtyCurat}${p ? p.unit : ''}
                                </button>
                                ${isUnlocked ? `
                                <button onclick="confirmDeleteIngredient(${rIdx}, ${iIdx})" 
                                        class="w-6 h-6 flex items-center justify-center bg-red-500/20 text-red-500 rounded-full">

                        ${nrPers > 1 ? `

    document.getElementById('hud-lei').innerText = tLei.toFixed(2) + ' LEI';
    document.getElementById('hud-per-day').innerText = pretPeZiLei.toFixed(2) + ' LEI/zi';

    const zileIntregi = Math.floor(zileAutonomie);
    const oreRest = Math.round(tOreAutonomie % orePerZi);
    let htmlAutonomie = `<span class="text-base font-black tracking-tighter text-white uppercase">${zileIntregi} ${zileIntregi === 1 ? 'zi' : 'zile'}</span>`;

    document.getElementById('hud-hours').innerHTML = htmlAutonomie;

    const bulkBtn = document.getElementById('bulk-select-btn');
    const bulkIcon = document.getElementById('bulk-select-icon');

        const anySelected = retete.some(r => r.selectat);
        const allSel = retete.length > 0 && retete.every(r => r.selectat);

                : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        }
    }

    if (lastEditedId) {
        setTimeout(() => {
            const el = document.getElementById(`recipe-${lastEditedId}`);
            if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); lastEditedId = null; }
        }, 100);
    }

    renderCatalog();
}

    catalog
        .filter(p => normalizeText(p.nume).includes(catSearch))

        .forEach((prod) => {
            const cIdx = catalog.findIndex(x => x.id === prod.id);
            const numeEscJS = prod.nume.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            cat.innerHTML += `
                <div class="glass-card p-5 flex justify-between items-center">

                               value="${prod.nume}" ${isUnlocked ? '' : 'readonly'}
                               onchange="updateCatalogField(${cIdx}, 'nume', this.value)">
                        <input class="text-[10px] font-black text-gray-600 uppercase bg-transparent outline-none border-none w-full ${textLockCls}" 
                               value="${prod.unit}" ${isUnlocked ? '' : 'readonly'}
                               onchange="updateCatalogField(${cIdx}, 'unit', this.value)">
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="bg-white/5 px-3 py-2 rounded-xl flex items-center gap-2 border border-white/5">
                            <input type="number" step="0.01" 
                                   class="w-16 text-right font-black text-emerald-400 bg-transparent outline-none ${isUnlocked ? '' : 'pointer-events-none'}" 
                                   value="${prod.pretLei}" ${isUnlocked ? '' : 'readonly'}
                                   onchange="updateCatalogField(${cIdx}, 'pretLei', parseFloat(this.value))">
                            <span class="text-[9px] font-bold text-gray-500">LEI</span>
                        </div>
                        ${isUnlocked ? `
                        <button onclick="openAuchan('${numeEscJS}')" 
                                class="w-8 h-8 flex items-center justify-center bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full active:scale-90 transition-all"
                                title="Caută pe Auchan">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                        <button onclick="confirmDeleteCatalogItem(${cIdx})" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500 border border-red-500/20 rounded-full">✕</button>` : ''}
                    </div>
                </div>`;
        });
}

// ============================================================
// CRUD
// ============================================================

async function updateCatalogField(cIdx, field, value) {
    catalog[cIdx][field] = value;
    await db_upsertCatalogItem(catalog[cIdx]);
    render();
}

async function addNewProductToCatalog() {
    const newProd = { id: 'c' + Date.now(), nume: 'Produs Nou', pretLei: 0, unit: 'Kg' };
    catalog.unshift(newProd);
    await db_upsertCatalogItem(newProd);
    render();
}

async function confirmDeleteCatalogItem(idx) {
    const prod = catalog[idx];
    if (confirm(`ATENȚIE: Ștergerea produsului "${prod.nume}" din catalog îl va elimina din toate calculele. Continui?`)) {
        await db_deleteCatalogItem(prod.id);
        catalog.splice(idx, 1);
        render();
    }
}

async function toggleSelectReteta(rIdx, checked) {
    retete[rIdx].selectat = checked;
    await db_upsertReteta(retete[rIdx]);
    render();
}

async function updateRetetaField(rIdx, field, value) {
    retete[rIdx][field] = value;
    await db_upsertReteta(retete[rIdx]);
    render();
}

async function addIngredient(rIdx) {
    retete[rIdx].ingrediente.push({ idProd: null, qty: 1 });
    await db_upsertReteta(retete[rIdx]);
    render();
}

async function addRecipe() {
    const newReteta = { id: Date.now(), selectat: true, nume: 'Meniu Nou', ore: 1, portii: 1, ingrediente: [], tags: '' };
    retete.push(newReteta);
    await db_upsertReteta(newReteta);
    render();
}

async function confirmDeleteRecipe(idx) {
    const reteta = retete[idx];
    if (confirm(`Ești sigur că vrei să ștergi "${reteta.nume}"?`)) {
        await db_deleteReteta(reteta.id);
        retete.splice(idx, 1);
        render();
    }
}

async function confirmDeleteIngredient(rIdx, iIdx) {
    const ing = retete[rIdx].ingrediente[iIdx];
    const produs = catalog.find(p => p.id === ing.idProd);
    if (produs) {
        if (confirm(`Ștergi ${produs.nume} din listă?`)) {
            retete[rIdx].ingrediente.splice(iIdx, 1);
            await db_upsertReteta(retete[rIdx]);
            render();
        }
    } else {
        retete[rIdx].ingrediente.splice(iIdx, 1);
        await db_upsertReteta(retete[rIdx]);
        render();
    }
}

// ============================================================
// PICKER-E
// ============================================================

function openProductPicker(rIdx, iIdx) {
    activeCtx = { rIdx, iIdx };
    document.getElementById('picker-search').value = "";
    renderPickerOptions();
    document.getElementById('product-picker').classList.add('active');
}

function renderPickerOptions() {
    const container = document.getElementById('product-options');
    const searchVal = normalizeText(document.getElementById('picker-search').value);
    container.innerHTML = '';
    catalog
        .filter(p => normalizeText(p.nume).includes(searchVal))
        .sort((a, b) => a.pretLei - b.pretLei)
        .forEach(prod => {
            container.innerHTML += `
                <div onclick="selectProduct('${prod.id}')" class="w-full p-4 glass-card mb-2 flex justify-between items-center active:scale-[0.98] transition-transform cursor-pointer">
                    <div>
                        <span class="block font-bold text-white text-base">${prod.nume}</span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase">${prod.unit}</span>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-black text-purple-400">${prod.pretLei.toFixed(2)} LEI</span>
                    </div>
                </div>`;
        });
}

async function selectProduct(id) {
    retete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].idProd = id;
    lastEditedId = retete[activeCtx.rIdx].id;
    await db_upsertReteta(retete[activeCtx.rIdx]);
    closeSheets();
    render();
}

async function setNum(val) {
    if (activeCtx.type === 'ore') retete[activeCtx.rIdx].ore = val;
    if (activeCtx.type === 'portii') retete[activeCtx.rIdx].portii = val;
    if (activeCtx.type === 'ingQty') retete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].qty = val;
    lastEditedId = retete[activeCtx.rIdx].id;
    await db_upsertReteta(retete[activeCtx.rIdx]);
    closeSheets();
    render();
}

function closeSheets() {
    document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
}

// ============================================================
// INIT
// ============================================================

window.onload = async function () {
    await db_loadCatalog();
    await db_loadRetete();
    await db_loadNumPersoane();
    render();
};

</script>
</body>
</html>
