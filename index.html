    body {
        font-family: 'Plus Jakarta Sans', sans-serif;

        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
    }

    #view-title {
        color: #ffffff !important;
        text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        display: block;
        opacity: 1;
    }

    .orb {
        position: fixed;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(192, 132, 252, 0.1) 0%, transparent 70%);
        z-index: -1; filter: blur(80px);
        animation: float 20s infinite alternate;
    }

    @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 20%); } }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
    }

    .inactive { opacity: 0.3; transform: scale(0.97); filter: grayscale(1); }

    .hud-status {
        position: fixed;

        border-radius: 26px;
        z-index: 900;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        border-left: 4px solid var(--primary);
    }


.bottom-sheet {
position: fixed;
bottom: -100%;
left: 0;
width: 100%;
height: 100%; /* Forțează înălțimea la 100% din ecran */
background: rgba(10, 10, 15, 0.98);
backdrop-filter: blur(40px);
-webkit-backdrop-filter: blur(40px);
border-top: 1px solid var(–glass-border);
z-index: 2000;
border-radius: 0; /* Eliminăm colțurile rotunjite pentru aspect Full Screen */
transition: bottom 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}


    .bottom-sheet.active { bottom: 0; }

    .num-key:active { background: var(--primary); transform: scale(0.9); }

    .tab-bar {
        position: fixed; bottom: 0; width: 100%;
        background: rgba(5, 5, 8, 0.95);
        backdrop-filter: blur(20px);

        padding: 15px 10px 35px;
        border-top: 1px solid var(--glass-border);
        z-index: 1000;
    }

    .nav-btn { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    .nav-btn.active { color: var(--primary); }

    /* Stil pentru inputul de căutare în catalog */
    .search-pill {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 12px 20px;
        width: 100%;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.3s;

/* Bottom sheet pentru catalog (rămâne mare) */
.bottom-sheet.full { height: 100%; bottom: -100%; }

/* Bottom sheet pentru cifre (devine mic și elegant) */
#number-picker {
height: auto;
bottom: -50%;
border-radius: 32px 32px 0 0;
padding-bottom: env(safe-area-inset-bottom); /* Respectă zona de gesturi pe iPhone */
background: rgba(15, 15, 25, 0.95);
border-top: 2px solid var(–primary);
}

#number-picker.active {
bottom: 0;
}

/* Grila de numere mai compactă */
.num-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 10px;
padding: 0 20px 30px 20px;
}

.num-key {
height: 55px; /* Puțin mai mic */
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.05);
transition: all 0.2s;
}


/* Asigură-te că lista are padding la final să nu fie acoperită de butonul plutitor */


#product-options {
padding-bottom: 80px;
scrollbar-width: none; /* Ascunde scrollbar-ul pe Firefox */
}

#product-options::-webkit-scrollbar {
display: none; /* Ascunde scrollbar-ul pe Chrome/Safari */
}

/* Stil pentru butonul plutitor de jos */
.bottom-sheet .absolute.bottom-6 button {
box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}


.bottom-sheet.active { 
bottom: 0 !important; 


}

/* === LOCK BUTTON === */
#lock-btn {
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 50%;
cursor: pointer;
transition: all 0.3s ease;
flex-shrink: 0;

#lock-btn:active { transform: scale(0.9); }
#lock-btn.unlocked {
background: rgba(192, 132, 252, 0.15);

/* Elemente vizibile doar când e deblocat */
.locked-only {
display: none !important;

body.unlocked .locked-only {
display: flex !important;

/* pentru elemente block */
.locked-only-block {
display: none !important;

body.unlocked .locked-only-block {
display: block !important;

.qty-btn-locked {

pointer-events: auto;

/* Ore/masă - vizibil mereu, clickabil doar deblocat */
.ore-locked {
pointer-events: none;

body.unlocked .ore-locked {
pointer-events: auto;

}

/* Preț catalog - read-only când blocat */
.pret-input-locked {
pointer-events: none;
}
body.unlocked .pret-input-locked {
pointer-events: auto;
}

async function loadFromSupabase() {

                unit: item.unit

            }));

    }

async function syncToSupabase(table, id, updateData) {
    if (!USE_SUPABASE || !isUnlocked) return;
    
    const { error } = await supabase
        .from(table)
        .update(updateData)
        .eq('id', id);
    
    if (error) console.error(`Eroare sync ${table}:`, error);
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/ț/g, "t").replace(/ș/g, "s").replace(/ă/g, "a").replace(/â/g, "a").replace(/î/g, "i");
}

function updateSearch(val) {
    searchTerm = normalizeText(val);

    document.getElementById('page-catalog').classList.toggle('hidden', tab !== 'catalog');
    const searchBar = document.getElementById('search-container');
    if(searchBar) searchBar.classList.toggle('hidden', tab !== 'home');
    document.getElementById('nav-home').className = tab === 'home' ? 'nav-btn active' : 'nav-btn';
    document.getElementById('nav-catalog').className = tab === 'catalog' ? 'nav-btn active' : 'nav-btn';
    document.getElementById('view-title').innerText = tab === 'home' ? 'Planificator' : 'Catalog';
    render();
}

// --- RENDER (AFIȘARE) ---

function render() {
    const list = document.getElementById('recipes-list');
    if (!list) return;
    list.innerHTML = '';
    let tEur = 0, tOre = 0;

    rețete.forEach(r => {
        let costLeiMasa = 0;
        r.ingrediente.forEach(ing => {
            const p = catalog.find(x => x.id === ing.idProd);
            if (p) costLeiMasa += (p.pretLei * ing.qty);
        });
        r.costEurCalculat = (costLeiMasa / CURS) * r.portii;
        r.totalOreCalculat = r.ore * r.portii;
        r.eficienta = r.costEurCalculat > 0 ? (r.totalOreCalculat / r.costEurCalculat) : 0;
        if (r.selectat) { tEur += r.costEurCalculat; tOre += r.totalOreCalculat; }
    });

    const reteteFiltrate = rețete
        .filter(r => normalizeText(r.nume).includes(searchTerm) || normalizeText(r.tags || "").includes(searchTerm))
        .sort((a, b) => b.eficienta - a.eficienta);

    reteteFiltrate.forEach((reteta) => {
        const rIdx = rețete.findIndex(r => r.id === reteta.id);
        list.innerHTML += `
            <div id="recipe-${reteta.id}" class="glass-card p-6 relative transition-all duration-500 ${reteta.selectat ? '' : 'inactive'}">
                <div class="flex items-center gap-4 mb-1">
                    <input type="checkbox" ${reteta.selectat ? 'checked' : ''} onchange="rețete[${rIdx}].selectat=this.checked; render()" class="w-6 h-6 accent-purple-500">
                    <input class="font-extrabold text-xl flex-grow text-white bg-transparent outline-none border-none ${isUnlocked ? '' : 'pointer-events-none'}" 
                           value="${reteta.nume}" ${isUnlocked ? '' : 'readonly'} onchange="rețete[${rIdx}].nume=this.value">
                </div>
                <div class="flex items-center gap-2 mb-6 ml-10">
                    <span class="text-purple-500 font-bold text-[10px]">#</span>
                    <input class="text-[10px] font-bold text-gray-500 bg-transparent border-none outline-none w-full uppercase tracking-widest ${isUnlocked ? '' : 'pointer-events-none'}" 
                           value="${reteta.tags || ''}" ${isUnlocked ? '' : 'readonly'} onchange="rețete[${rIdx}].tags=this.value; render()">
                </div>
                <div class="space-y-3 mb-6">
                    ${reteta.ingrediente.map((ing, iIdx) => {
                        const p = catalog.find(x => x.id === ing.idProd);
                        return `
                        <div class="flex items-center gap-2 bg-white/5 p-2 pr-3 rounded-2xl border border-white/5">
                            <button onclick="${isUnlocked ? `openProductPicker(${rIdx}, ${iIdx})` : ''}" class="flex-grow text-left text-sm font-semibold text-gray-200 truncate pl-2">
                                ${p ? p.nume : 'Alege Produs...'}
                            </button>
                            <button onclick="${isUnlocked ? `openNumPicker(${rIdx}, 'ingQty', ${iIdx})` : ''}" class="bg-purple-500/20 text-purple-300 px-3 py-1.5 rounded-xl text-xs font-black min-w-[65px]">
                                ${ing.qty} ${p ? p.unit : ''}
                            </button>
                            ${isUnlocked ? `<button onclick="confirmDeleteIngredient(${rIdx}, ${iIdx})" class="w-7 h-7 flex items-center justify-center bg-red-500/20 text-red-500 rounded-full">✕</button>` : ''}
                        </div>`;
                    }).join('')}
                    ${isUnlocked ? `<button onclick="rețete[${rIdx}].ingrediente.push({idProd:null, qty:1}); render()" class="text-[9px] font-black text-purple-400 uppercase tracking-widest pt-2">+ ADĂUGARE INGREDIENT</button>` : ''}
                </div>
                <div class="grid grid-cols-3 gap-2 border-t border-white/5 pt-6 items-center text-center">
                    <div onclick="${isUnlocked ? `openNumPicker(${rIdx}, 'ore')` : ''}" class="text-left ${isUnlocked ? 'cursor-pointer' : ''}">
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">Ore/Masă</p>
                        <p class="text-lg font-bold text-white">${reteta.ore}h</p>
                    </div>
                    <div class="bg-purple-500/10 py-2 rounded-2xl border border-purple-500/20">
                        <p class="text-[8px] font-black text-emerald-400 uppercase tracking-widest mb-0.5">Preț Total</p>
                        <p class="text-xl font-black text-white leading-none">${reteta.costEurCalculat.toFixed(2)}€</p>
                    </div>
                    <div onclick="openNumPicker(${rIdx}, 'portii')" class="text-right cursor-pointer">
                        <p class="text-[8px] font-black text-gray-500 uppercase tracking-widest mb-1">Nr. Porții</p>
                        <p class="text-lg font-bold text-white">${reteta.portii}</p>
                    </div>
                </div>
                ${isUnlocked ? `<button onclick="confirmDeleteRecipe(${rIdx})" class="absolute -top-2 -right-2 w-8 h-8 bg-red-500/20 text-red-500 border border-red-500/30 rounded-full flex items-center justify-center">✕</button>` : ''}
            </div>`;
    });

    if (lastEditedId) {
        setTimeout(() => {
            const el = document.getElementById(`recipe-${lastEditedId}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            lastEditedId = null;
        }, 150);
    }

    const zile = Math.floor(tOre / 12);
    const oreRest = tOre % 12;
    document.getElementById('hud-eur').innerText = tEur.toFixed(2) + '€';
    document.getElementById('hud-hours').innerHTML = `<div class="flex flex-col items-start leading-none"><span class="text-base font-extrabold text-white">${oreRest === 0 ? zile + ' zile' : zile + ' → ' + (zile + 1) + ' zile'}</span><span class="text-[10px] font-black text-purple-400/80 uppercase">${oreRest}h / 12h</span></div>`;
    
    renderCatalog();
}

function renderCatalog() {
    const cat = document.getElementById('catalog-list');
    if (!cat) return;
    const catSearch = normalizeText(document.getElementById('catalog-search')?.value || "");
    cat.innerHTML = '';
    catalog.filter(p => normalizeText(p.nume).includes(catSearch)).sort((a, b) => a.pretLei - b.pretLei).forEach((prod) => {
        const cIdx = catalog.findIndex(x => x.id === prod.id);
        cat.innerHTML += `<div class="glass-card p-5 flex justify-between items-center"><div class="flex-grow"><input class="font-bold text-sm block text-white bg-transparent outline-none w-full ${isUnlocked ? '' : 'pointer-events-none'}" value="${prod.nume}" ${isUnlocked ? '' : 'readonly'} onchange="catalog[${cIdx}].nume=this.value; render()"><input class="text-[10px] font-black text-gray-600 uppercase bg-transparent outline-none w-full ${isUnlocked ? '' : 'pointer-events-none'}" value="${prod.unit}" ${isUnlocked ? '' : 'readonly'} onchange="catalog[${cIdx}].unit=this.value; render()"></div><div class="flex items-center gap-3"><div class="bg-white/5 px-3 py-2 rounded-xl flex items-center gap-2 border border-white/5"><input type="number" step="0.01" class="w-16 text-right font-black text-emerald-400 bg-transparent outline-none ${isUnlocked ? '' : 'pointer-events-none'}" value="${prod.pretLei}" onchange="catalog[${cIdx}].pretLei=parseFloat(this.value); render()"><span class="text-[9px] font-bold text-gray-500">LEI</span></div>${isUnlocked ? `<button onclick="confirmDeleteCatalogItem(${cIdx})" class="w-8 h-8 text-red-500">✕</button>` : ''}</div></div>`;
    });
}

// --- PICKERS & MODALS ---

function openShoppingList() {
    const listContent = document.getElementById('shopping-list-content');
    const summaryCount = document.getElementById('shopping-summary-count');
    listContent.innerHTML = '';
    let cumparaturi = {};
    rețete.forEach(r => { if (r.selectat) { r.ingrediente.forEach(ing => { if (!ing.idProd) return; const qtyTotala = ing.qty * r.portii; cumparaturi[ing.idProd] = (cumparaturi[ing.idProd] || 0) + qtyTotala; }); } });
    const keys = Object.keys(cumparaturi);
    summaryCount.innerText = `${keys.length} PRODUSE UNICE`;
    if (keys.length === 0) listContent.innerHTML = '<p class="text-center text-gray-500 py-10 font-bold uppercase text-xs">Nicio rețetă selectată</p>';
    else {
        keys.forEach(idProd => {
            const produs = catalog.find(p => p.id === idProd);
            const cantitate = cumparaturi[idProd];
            const pretTotalProdus = (produs.pretLei * cantitate);
            listContent.innerHTML += `<div class="glass-card p-4 flex justify-between items-center border-l-4 border-purple-500"><div><p class="font-bold text-white text-sm">${produs.nume}</p><p class="text-[10px] font-black text-gray-500 uppercase">${cantitate} ${produs.unit} × ${produs.pretLei} lei</p></div><div class="text-right"><p class="text-sm font-black text-white">${pretTotalProdus.toFixed(2)} LEI</p><p class="text-[10px] font-bold text-purple-400">${(pretTotalProdus/CURS).toFixed(2)} €</p></div></div>`;
        });
    }
    document.getElementById('shopping-sheet').classList.add('active');
}

function openProductPicker(rIdx, iIdx) { activeCtx = { rIdx, iIdx }; document.getElementById('picker-search').value = ""; renderPickerOptions(); document.getElementById('product-picker').classList.add('active'); }
function renderPickerOptions() {
    const container = document.getElementById('product-options');
    const searchVal = normalizeText(document.getElementById('picker-search').value);
    container.innerHTML = '';
    catalog.filter(p => normalizeText(p.nume).includes(searchVal)).sort((a, b) => a.pretLei - b.pretLei).forEach(prod => {
        container.innerHTML += `<button onclick="selectProduct('${prod.id}')" class="w-full p-5 glass-card mb-2 text-left flex justify-between items-center active:bg-purple-500/20"><span class="font-bold text-white text-sm">${prod.nume}</span><span class="text-[10px] font-bold text-purple-400">${prod.pretLei} lei/${prod.unit}</span></button>`;
    });
}

function selectProduct(id) { rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].idProd = id; lastEditedId = rețete[activeCtx.rIdx].id; closeSheets(); render(); }
function openNumPicker(rIdx, type, iIdx = null) { activeCtx = { rIdx, type, iIdx }; document.getElementById('number-picker').classList.add('active'); }
function setNum(val) { if(activeCtx.type === 'ore') rețete[activeCtx.rIdx].ore = val; if(activeCtx.type === 'portii') rețete[activeCtx.rIdx].portii = val; if(activeCtx.type === 'ingQty') rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].qty = val; lastEditedId = rețete[activeCtx.rIdx].id; closeSheets(); render(); }
function closeSheets() { document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); }
function confirmDeleteRecipe(idx) { if (confirm(`Ștergi "${rețete[idx].nume}"?`)) { rețete.splice(idx, 1); render(); } }
function confirmDeleteIngredient(rIdx, iIdx) { rețete[rIdx].ingrediente.splice(iIdx, 1); render(); }
function confirmDeleteCatalogItem(idx) { if (confirm(`Ștergi "${catalog[idx].nume}" din tot catalogul?`)) { catalog.splice(idx, 1); render(); } }
function addNewProductToCatalog() { catalog.unshift({ id: 'c' + Date.now(), nume: 'Produs Nou', pretLei: 0, unit: 'Kg' }); render(); }
function addRecipe() { rețete.push({ id: Date.now(), selectat: true, nume: 'Meniu Nou', ore: 1, portii: 1, ingrediente: [], tags: '' }); render(); }

window.onload = render;
</script>
