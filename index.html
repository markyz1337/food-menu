<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Budget Planner - Simulare</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #4caf50;
            --border-color: #333;
            --input-bg: #252525;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin: 0; }

        .stats-bar {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .stat-item span {
            display: block;
            font-size: 0.8rem;
            color: #888;
        }

        .stat-item strong {
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #222;
            text-align: left;
            padding: 12px;
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        input, textarea {
            background-color: var(--input-bg);
            border: 1px solid transparent;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 90%;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .price-col { width: 100px; }
        .qty-col { width: 80px; }
        .total-col { font-weight: bold; color: var(--accent-color); width: 100px; }

        .btn-add {
            margin-top: 20px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add:hover { opacity: 0.9; }

        .currency-hint { font-size: 0.8rem; color: #666; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mâncare (20 zile)</h1>
        <div>Curs: <strong>5.09 lei</strong></div>
    </header>

    <div class="stats-bar">
        <div class="stat-item">
            <span>TOTAL GENERAL (EUR)</span>
            <strong id="grand-total-eur">0.00 €</strong>
        </div>
        <div class="stat-item">
            <span>TOTAL ESTIMAT (RON)</span>
            <strong id="grand-total-ron">0.00 RON</strong>
        </div>
    </div>

    <table id="food-table">
        <thead>
            <tr>
                <th>Denumire Produs</th>
                <th>Ingrediente / Detalii</th>
                <th class="price-col">Preț (€)</th>
                <th class="qty-col">Cantitate</th>
                <th class="total-col">Total</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <button class="btn-add" onclick="addRow()">+ Adaugă Produs Nou</button>
</div>

<script>
    // Date inițiale bazate pe poza ta
    let foodData = [
        { name: "Salată Olivie", ingredients: "Cartofi, morcov, mazăre, maioneză", price: 7.42, qty: 10 },
        { name: "Fulgi de ovăz", ingredients: "5 dimineți", price: 1.94, qty: 1 },
        { name: "Plov în cuptor", ingredients: "Orez, carne, legume", price: 5.37, qty: 1 },
        { name: "Cartofi prăjiți", ingredients: "Ketchup inclus", price: 1.14, qty: 2 }
    ];

    const exchangeRate = 5.09;

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        let totalEur = 0;

        foodData.forEach((item, index) => {
            const rowTotal = item.price * item.qty;
            totalEur += rowTotal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${item.name}" onchange="updateData(${index}, 'name', this.value)"></td>
                <td><input type="text" value="${item.ingredients}" onchange="updateData(${index}, 'ingredients', this.value)"></td>
                <td><input type="number" step="0.01" value="${item.price}" onchange="updateData(${index}, 'price', this.value)" class="price-col"></td>
                <td><input type="number" value="${item.qty}" onchange="updateData(${index}, 'qty', this.value)" class="qty-col"></td>
                <td class="total-col">${rowTotal.toFixed(2)} €</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('grand-total-eur').innerText = totalEur.toFixed(2) + ' €';
        document.getElementById('grand-total-ron').innerText = (totalEur * exchangeRate).toFixed(2) + ' RON';
    }

    function updateData(index, field, value) {
        if (field === 'price' || field === 'qty') {
            foodData[index][field] = parseFloat(value) || 0;
        } else {
            foodData[index][field] = value;
        }
        renderTable();
    }

    function addRow() {
        foodData.push({ name: "Produs nou", ingredients: "-", price: 0, qty: 1 });
        renderTable();
    }

    // Inițializare
    renderTable();
</script>

</body>
</html>
