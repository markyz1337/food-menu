<!DOCTYPE html>

<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GastroGlass HUD Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }


    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #020205;
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
    }

    #view-title {
        color: #ffffff !important;
        text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        display: block;
        opacity: 1;
    }

    .orb {
        position: fixed;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(192, 132, 252, 0.1) 0%, transparent 70%);
        z-index: -1; filter: blur(80px);
        animation: float 20s infinite alternate;
    }

    @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 20%); } }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
    }

    .inactive { opacity: 0.95; transform: scale(0.99); filter: grayscale(1); }


/* Forțăm header-ul rețetei să fie mereu vizibil și colorat */
.glass-card.inactive .recipe-header {
    opacity: 1 !important;
    filter: none !important;
}

/* Opțional: păstrăm checkbox-ul clar */
.glass-card.inactive input[type="checkbox"] {
    opacity: 1;
}

/* Asigurăm că textul titlului rămâne alb */
.glass-card.inactive .recipe-title-input {
    color: white !important;
    -webkit-text-fill-color: white !important;
}



    .hud-status {
        position: fixed;
        right: 20px;
        bottom: 90px;
        padding: 10px 22px;
        background: rgba(15, 15, 20, 0.8);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(192, 132, 252, 0.4);
        border-radius: 29px;
        z-index: 900;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        border-left: 4px solid var(--primary);
    }


/* Stil unitar pentru toate foile de jos */

.bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    /* Schimbă height: auto în: */
    height: 75vh; 
    background: rgba(10, 10, 15, 0.98);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-top: 1px solid var(--glass-border);
    z-index: 2000;
    transform: translateY(110%); 
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    border-radius: 32px 32px 0 0;
    display: flex; /* Ajută la alinierea scroll-ului */
    flex-direction: column;
}

/* Stil pentru selectorul care ocupă TOT ecranul */
.bottom-sheet.full { 
    height: 100vh !important; /* Tot ecranul */
    height: 100dvh !important; /* Dynamic Viewport Height pentru mobil (evită bug-ul cu bara de adrese) */
    top: 0;
    border-radius: 0; /* Scoatem colțurile rotunjite */
    background: #020205; /* Fundal solid ca să nu se vadă ce e în spate */
}

/* Ajustăm containerul de scroll să respire sub butonul de închidere */
#product-options {
    flex-grow: 1;
    overflow-y: auto;
    padding: 0 20px 120px 20px; /* Padding generos jos pentru butonul plutitor */
}

.bottom-sheet.active { 
    transform: translateY(0); 
}

/* Specificitate pentru Number Picker */
#number-picker {
    background: rgba(15, 15, 25, 0.95);
    border-top: 2px solid var(--primary);
    padding-bottom: env(safe-area-inset-bottom);
}

.num-key {
    height: 60px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    font-size: 1.25rem;
    font-weight: 700;
    transition: all 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efect de apăsare (Haptic feedback vizual) */
.num-key:active {
    background: var(--primary);
    color: black;
    transform: scale(0.92);
}
.num-key, .nav-btn, button {
    touch-action: manipulation;
}

    /* Navigația stil Pill plutitor */
    .tab-bar {
        position: fixed; 
        bottom: 10px; /* Ridicat de la margine pentru efect "în aer" */
        left: 50%;
        transform: translateX(-50%); /* Centrare perfectă */
        width: 90%;
        max-width: 400px;
        
        background: rgba(15, 15, 20, 0.6); /* Transparență redusă pentru glassmorphism */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        
        display: flex; 
        justify-content: space-around;
        padding: 8px; /* Spațiu interior pentru butoane */
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px; /* Colțuri foarte rotunjite - forma de pastilă */
        z-index: 1000;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .nav-btn { 
        flex: 1;
        padding: 15px 0;
        font-size: 12px; 
        font-weight: 800; 
        text-transform: uppercase; 
        letter-spacing: 1.5px; 
        color: rgba(255, 255, 255, 0.4); 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-btn.active { 
        color: #ffffff; 
        background: rgba(192, 132, 252, 0.2); /* Fundal discret pentru butonul activ */
        box-shadow: inset 0 0 15px rgba(192, 132, 252, 0.1);
    }

    /* Ajustăm padding-ul de jos al paginii ca să nu fie acoperit ultimul element */
    body.pb-44 {
        padding-bottom: 120px;
    }
    
/* Permite scroll-ul, dar trimite click-ul imediat spre element */
.nav-btn, .num-key, .glass-card, button {
    touch-action: manipulation;
}

/* Prevenirea blocajului de scroll pe TabBar */
.tab-bar {
    touch-action: none; /* Deoarece TabBar-ul e fix și nu trebuie să facă scroll */
}


    /* Stil pentru inputul de căutare în catalog */
    .search-pill {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 12px 20px;
        width: 100%;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.3s;
    }
    .search-pill:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }





#number-picker.active {
bottom: 0;
}



.num-key {
height: 55px; /* Puțin mai mic */
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.05);
transition: all 0.2s;
}


/* Asigură-te că lista are padding la final să nu fie acoperită de butonul plutitor */


#product-options {
padding-bottom: 80px;
scrollbar-width: none; /* Ascunde scrollbar-ul pe Firefox */
}

#product-options::-webkit-scrollbar {
display: none; /* Ascunde scrollbar-ul pe Chrome/Safari */
}

/* Stil pentru butonul plutitor de jos */
.bottom-sheet .absolute.bottom-6 button {
box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}


.bottom-sheet.active { 
bottom: 0 !important; 


}

/* === LOCK BUTTON === */
#lock-btn {
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 50%;
cursor: pointer;
transition: all 0.3s ease;
flex-shrink: 0;
}
#lock-btn:active { transform: scale(0.9); }
#lock-btn.unlocked {
background: rgba(192, 132, 252, 0.15);
border-color: rgba(192, 132, 252, 0.4);
}

/* Elemente vizibile doar când e deblocat */
.locked-only {
display: none !important;
}
body.unlocked .locked-only {
display: flex !important;
}
/* pentru elemente block */
.locked-only-block {
display: none !important;
}
body.unlocked .locked-only-block {
display: block !important;
}

/* Cantitate ingredient - vizibilă mereu, dar clickabilă doar deblocat */
.qty-btn-locked {
pointer-events: none;
opacity: 0.6;
}
body.unlocked .qty-btn-locked {
pointer-events: auto;
opacity: 1;
}

/* Ore/masă - vizibil mereu, clickabil doar deblocat */
.ore-locked {
pointer-events: none;
cursor: default;
}
body.unlocked .ore-locked {
pointer-events: auto;
cursor: pointer;
}

/* Preț catalog - read-only când blocat */
.pret-input-locked {
pointer-events: none;
}
body.unlocked .pret-input-locked {
pointer-events: auto;
}




/* Containerul este vizibil implicit (extins) */
.recipe-content-wrapper {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 2000px; 
    opacity: 1;
    overflow: hidden;
}

/* Când activăm modul "restrâns" (collapsed), ascundem conținutul */
body.collapsed-active .recipe-content-wrapper {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
}

/* Rotiți săgeata butonului invers față de înainte */
#collapse-btn svg {
    transition: transform 0.3s ease;
    transform: rotate(0deg); /* Săgeata în sus (pentru a restrânge) */
}

body.collapsed-active #collapse-btn svg {
    transform: rotate(180deg); /* Săgeata în jos (pentru a extinde) */
}




.person-picker {
    position: fixed;
    right: 25px;
    bottom: 155px; /* Poziționat deasupra HUD-ului */
    background: rgba(15, 15, 20, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(192, 132, 252, 0.4);
    border-radius: 18px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 900;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    transition: all 0.2s ease;
}
.person-picker:active { transform: scale(0.95); }
#num-persoane-input {
    background: transparent;
    border: none;
    color: white;
    font-weight: 800;
    font-size: 16px;
    width: 15px;
    text-align: center;
    outline: none;
}





</style>


</head>

async function db_upsertReteta(reteta) {
    if (!USE_SUPABASE) return;
    const payload = {
        nume: reteta.nume,
        ore: reteta.ore,
        portii: reteta.portii,
        tags: reteta.tags || '',
        selectat: reteta.selectat,
        ingrediente: reteta.ingrediente
    };
    // Dacă ID-ul e generat de Supabase (BIGINT IDENTITY), nu-l trimitem la INSERT
    if (typeof reteta.id === 'number' && reteta.id > 1000000000) {
        // ID generat local (timestamp) -- INSERT fără id, Supabase generează unul nou
        const { data, error } = await supabaseClient.from('retete').insert(payload).select().single();
        if (error) { console.error('Eroare inserare rețetă:', error); return; }
        // Actualizăm ID-ul local cu cel de la Supabase
        reteta.id = data.id;
    } else {
        // ID existent de la Supabase -- UPDATE
        const { error } = await supabaseClient.from('retete').update(payload).eq('id', reteta.id);
        if (error) console.error('Eroare update rețetă:', error);
    }
}

async function db_deleteReteta(id) {
    if (!USE_SUPABASE) return;
    // ID-urile locale (timestamp mare) nu există în DB, ignorăm
    if (typeof id === 'number' && id > 1000000000 && !USE_SUPABASE) return;
    const { error } = await supabaseClient.from('retete').delete().eq('id', id);
    if (error) console.error('Eroare ștergere rețetă:', error);
}

function applyLockState(shouldUnlock) {
    isUnlocked = shouldUnlock;
    const body = document.body;
    const btn = document.getElementById('lock-btn');
    const iconLocked = document.getElementById('icon-locked');
    const iconUnlocked = document.getElementById('icon-unlocked');

    if (isUnlocked) {
        body.classList.add('unlocked');
        btn.classList.add('unlocked');
        iconLocked.style.display = 'none';
        iconUnlocked.style.display = 'block';
    } else {
        body.classList.remove('unlocked');
        btn.classList.remove('unlocked');
        iconLocked.style.display = 'block';
        iconUnlocked.style.display = 'none';
    }
    render();
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ț/g, "t").replace(/ș/g, "s")
        .replace(/ă/g, "a").replace(/â/g, "a")
        .replace(/î/g, "i");
}

function updateSearch(val) {
    searchTerm = normalizeText(val);
    const clearBtn = document.getElementById('clear-search');
    if (val.length > 0) clearBtn.classList.remove('hidden');
    else clearBtn.classList.add('hidden');
    render();
}

function clearSearch() {
    const input = document.getElementById('main-search');
    input.value = "";
    updateSearch("");
    input.focus();
}

function switchTab(tab) {
    // Dacă utilizatorul apasă pe tab-ul deja activ, nu face nimic
    if (currentTab === tab) return;

    // Salvează poziția curentă a scroll-ului
    scrollPositions[currentTab] = window.scrollY;

    // Schimbă vizibilitatea paginilor
    document.getElementById('page-home').classList.toggle('hidden', tab !== 'home');
    document.getElementById('page-catalog').classList.toggle('hidden', tab !== 'catalog');
    
    const searchBar = document.getElementById('search-container');
    if (searchBar) searchBar.classList.toggle('hidden', tab !== 'home');

    // Actualizare clase butoane
    document.getElementById('nav-home').classList.toggle('active', tab === 'home');
    document.getElementById('nav-catalog').classList.toggle('active', tab === 'catalog');
    
    document.getElementById('view-title').innerText = tab === 'home' ? 'Planificator' : 'Catalog';

    currentTab = tab;

    // Render și Scroll
    render();
    setTimeout(() => {
        window.scrollTo({
            top: scrollPositions[tab] || 0,
            behavior: 'instant'
        });
    }, 10);
}

function render() {
    const list = document.getElementById('recipes-list');
    if (!list) return;
    list.innerHTML = '';
    let tEur = 0, tOre = 0;

    // 0. PRELUARE NR PERSOANE PENTRU CALCUL
    const inputPers = document.getElementById('num-persoane-input');
    let nrPers = parseInt(inputPers.value) || 1;

    // 1. CALCULARE DATE ȘI EFICIENȚĂ
    rețete.forEach(r => {
        let costLeiMasa = 0;
        r.ingrediente.forEach(ing => {
            const p = catalog.find(x => x.id === ing.idProd);
            if (p) costLeiMasa += (p.pretLei * ing.qty);
        });

        r.costEurCalculat = (costLeiMasa / CURS) * r.portii;
        r.totalOreCalculat = r.ore * r.portii;
        r.eficienta = r.costEurCalculat > 0 ? (r.totalOreCalculat / r.costEurCalculat) : 0;

        if (r.selectat) {
            tEur += r.costEurCalculat;
            tOre += r.totalOreCalculat;
        }
    });

    // 2. FILTRARE ȘI SORTARE
    const reteteFiltrate = rețete
        .filter(r => {
            const nNume = normalizeText(r.nume);
            const nTags = normalizeText(r.tags || "");
            return nNume.includes(searchTerm) || nTags.includes(searchTerm);
        })
        .sort((a, b) => b.eficienta - a.eficienta);

    // 3. GENERARE HTML REȚETE
    reteteFiltrate.forEach((reteta) => {
        const rIdx = rețete.findIndex(r => r.id === reteta.id);
        const oreCls = isUnlocked ? 'cursor-pointer' : 'ore-locked cursor-default';
        const textLockCls = isUnlocked ? '' : 'pointer-events-none';
        
        const collapsedClass = isCollapsed ? 'collapsed' : '';

        list.innerHTML += `
            <div id="recipe-${reteta.id}" 
                 onclick="handleCardClick(event, ${rIdx})"
                 class="glass-card p-5 relative transition-all duration-300 ${reteta.selectat ? '' : 'inactive'} ${collapsedClass}">
                
                <div class="flex items-center gap-4 mb-1">
                    <input type="checkbox" ${reteta.selectat ? 'checked' : ''} 
                           onchange="toggleSelectReteta(${rIdx}, this.checked)" 
                           class="w-6 h-6 accent-purple-500">
                    <input class="font-extrabold text-xl flex-grow text-white bg-transparent outline-none border-none ${textLockCls}" 
                           value="${reteta.nume}" 
                           ${isUnlocked ? '' : 'readonly'}
                           onchange="updateRetetaField(${rIdx}, 'nume', this.value)">
                </div>
                
                <div class="recipe-content-wrapper">
                    <div class="flex items-center gap-2 mb-4 ml-10">
                        <span class="text-purple-500 font-bold text-[10px]">#</span>
                        <input class="text-[10px] font-bold text-gray-500 bg-transparent border-none outline-none w-full uppercase tracking-widest ${textLockCls}" 
                               placeholder="taguri..."
                               value="${reteta.tags || ''}" 
                               ${isUnlocked ? '' : 'readonly'}
                               onchange="updateRetetaField(${rIdx}, 'tags', this.value)">
                    </div>

                    <div class="space-y-2 mb-4">
                        ${reteta.ingrediente.map((ing, iIdx) => {
                            const p = catalog.find(x => x.id === ing.idProd);
                            const qtyCurat = Number(parseFloat(ing.qty).toFixed(3));
                            
                            return `
                            <div class="flex items-center gap-2 bg-white/5 p-2 pr-3 rounded-2xl border border-white/5">
                                ${isUnlocked ? `
                                <button onclick="openProductPicker(${rIdx}, ${iIdx})" class="flex-grow text-left text-xs font-semibold text-gray-200 truncate pl-2">
                                    ${p ? p.nume : 'Alege Produs...'}
                                </button>` : `
                                <span class="flex-grow text-left text-xs font-semibold text-gray-200 truncate pl-2">
                                    ${p ? p.nume : 'Alege Produs...'}
                                </span>`}
                                <button onclick="${isUnlocked ? `openNumPicker(${rIdx}, 'ingQty', ${iIdx})` : ''}" 
                                        class="bg-purple-500/20 text-purple-300 px-3 py-1 rounded-xl text-[10px] font-black min-w-[55px] ${isUnlocked ? '' : 'opacity-60 cursor-default'}">
                                    ${qtyCurat}${p ? p.unit : ''}
                                </button>
                                ${isUnlocked ? `
                                <button onclick="confirmDeleteIngredient(${rIdx}, ${iIdx})" 
                                        class="w-6 h-6 flex items-center justify-center bg-red-500/20 text-red-500 rounded-full">
                                    <span class="text-[10px]">✕</span>
                                </button>` : ''}
                            </div>`;
                        }).join('')}
                        ${isUnlocked ? `<button onclick="addIngredient(${rIdx})" class="text-[9px] font-black text-purple-400 uppercase tracking-widest pt-1">+ Ingredient</button>` : ''}
                    </div>
                </div>

                <div class="recipe-stats-footer grid grid-cols-3 gap-2 border-t border-white/5 pt-3 items-center text-center">
                    
<!-- ORE - REPARAT: FĂRĂ ITALIC, SPAȚIERE STRÂNSĂ -->
<div onclick="${isUnlocked ? `openNumPicker(${rIdx}, 'ore')` : ''}" class="${oreCls} flex flex-col items-center">
    <p class="text-[7px] font-black text-gray-500 uppercase tracking-widest leading-none mb-1">Ore</p>
    <p class="text-lm font-bold text-white leading-none">${reteta.ore}h</p>
    
    ${nrPers > 1 ? `
    <div class="mt-1 flex items-center justify-center opacity-90">
        <!-- 1. NUMĂR (Am scos 'italic' și am pus 'text-purple-400') -->
        <span class="text-[9px] font-extrabold text-purple-400" style="line-height: 1;">${nrPers}</span>
        
        <!-- 2. ICONIȚĂ (Am micșorat marginea laterală) -->
        <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 2px;">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
        
        <!-- 3. ORE REZULTATE -->
        <span class="text-white font-bold text-[9px]" style="line-height: 1;">${(reteta.ore / nrPers).toFixed(1)}h</span>
    </div>
    ` : ''}
</div>
                    <div class="bg-purple-500/10 py-1.5 rounded-xl border border-purple-500/20">
                        <p class="text-[7px] font-black text-emerald-400 uppercase tracking-widest">Preț Total</p>
                        <p class="text-lg font-black text-white leading-none">${reteta.costEurCalculat.toFixed(2)}€</p>
                    </div>
                    
                    <div onclick="openNumPicker(${rIdx}, 'portii')" class="cursor-pointer flex flex-col items-center">
                        <p class="text-[7px] font-black text-gray-500 uppercase tracking-widest">Porții</p>
                        <p class="text-lm font-bold text-white">${reteta.portii}</p>
                    </div>
                </div>

                ${isUnlocked ? `<button onclick="confirmDeleteRecipe(${rIdx})" class="absolute -top-2 -right-2 w-7 h-7 bg-red-500/20 text-red-500 border border-red-500/30 rounded-full flex items-center justify-center font-bold shadow-lg">✕</button>` : ''}
            </div>`;
    });

    // 4. ACTUALIZARE HUD
    let tEurTotal = tEur; 
    let tOreAutonomie = tOre / nrPers;
    const orePerZi = 12; 
    const zileAutonomie = tOreAutonomie / orePerZi;
    const pretPeZi = tOre > 0 ? (tEurTotal / tOre) * (orePerZi * nrPers) : 0;

    document.getElementById('hud-eur').innerText = tEurTotal.toFixed(2) + '€';
    document.getElementById('hud-per-day').innerText = pretPeZi.toFixed(2) + '€/zi';

    const zileIntregi = Math.floor(zileAutonomie);
    const oreRest = Math.round(tOreAutonomie % orePerZi);

    let htmlAutonomie = `<span class="text-base font-black tracking-tighter text-white uppercase">${zileIntregi} ${zileIntregi === 1 ? 'zi' : 'zile'}</span>`;
    if (oreRest > 0) {
        htmlAutonomie += `<span class="text-[10px] font-black text-purple-400 uppercase tracking-tighter leading-none">${oreRest}H / ${orePerZi}H</span>`;
    }
    document.getElementById('hud-hours').innerHTML = htmlAutonomie;    
    
    // 5. ICONIȚĂ BULK SELECT
    const bulkBtn = document.getElementById('bulk-select-btn');
    const bulkIcon = document.getElementById('bulk-select-icon');
    if(bulkBtn && bulkIcon) {
        const anySelected = rețete.some(r => r.selectat);
        const allSelected = rețete.length > 0 && rețete.every(r => r.selectat);
        if (allSelected) {
            bulkBtn.className = "w-10 h-10 flex items-center justify-center bg-purple-600 text-white rounded-full shadow-lg active:scale-90 transition-all";
            bulkIcon.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        } else {
            bulkBtn.className = "w-10 h-10 flex items-center justify-center bg-white text-black rounded-full shadow-lg active:scale-90 transition-all";
            bulkIcon.innerHTML = anySelected ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>` : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        }
    }

    // 6. LOGICA DE SCROLL AUTOMAT
    if (lastEditedId) {
        setTimeout(() => {
            const editedElement = document.getElementById(`recipe-${lastEditedId}`);
            if (editedElement) {
                editedElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                lastEditedId = null;
            }
        }, 100);
    }

    renderCatalog();
}


function renderCatalog() {
    const cat = document.getElementById('catalog-list');
    if (!cat) return;

    const catSearch = normalizeText(document.getElementById('catalog-search')?.value || "");
    cat.innerHTML = '';

    const catalogFiltrat = catalog
        .filter(p => normalizeText(p.nume).includes(catSearch))
        .sort((a, b) => a.pretLei - b.pretLei);

    const textLockCls = isUnlocked ? '' : 'pointer-events-none';

    catalogFiltrat.forEach((prod) => {
        const cIdx = catalog.findIndex(x => x.id === prod.id);

        cat.innerHTML += `
            <div class="glass-card p-5 flex justify-between items-center">
                <div class="flex-grow">
                    <input class="font-bold text-sm block text-white bg-transparent outline-none border-none w-full ${textLockCls}" 
                           value="${prod.nume}" 
                           ${isUnlocked ? '' : 'readonly'}
                           onchange="updateCatalogField(${cIdx}, 'nume', this.value)">
                    <input class="text-[10px] font-black text-gray-600 uppercase bg-transparent outline-none border-none w-full ${textLockCls}" 
                           value="${prod.unit}" 
                           ${isUnlocked ? '' : 'readonly'}
                           onchange="updateCatalogField(${cIdx}, 'unit', this.value)">
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="bg-white/5 px-3 py-2 rounded-xl flex items-center gap-2 border border-white/5">
                        <input type="number" step="0.01" 
                               class="w-16 text-right font-black text-emerald-400 bg-transparent outline-none ${isUnlocked ? '' : 'pointer-events-none'}" 
                               value="${prod.pretLei}" 
                               ${isUnlocked ? '' : 'readonly'}
                               onchange="updateCatalogField(${cIdx}, 'pretLei', parseFloat(this.value))">
                        <span class="text-[9px] font-bold text-gray-500">LEI</span>
                    </div>
                    ${isUnlocked ? `<button onclick="confirmDeleteCatalogItem(${cIdx})" class="w-8 h-8 flex items-center justify-center bg-red-500/10 text-red-500 border border-red-500/20 rounded-full">✕</button>` : ''}
                </div>
            </div>`;
    });
}

// ============================================================
// FUNCȚII CRUD CU SYNC SUPABASE
// ============================================================

// --- Catalog ---

async function updateCatalogField(cIdx, field, value) {
    catalog[cIdx][field] = value;
    await db_upsertCatalogItem(catalog[cIdx]);
    render();
}

async function addNewProductToCatalog() {
    const newProd = { id: 'c' + Date.now(), nume: 'Produs Nou', pretLei: 0, unit: 'Kg' };
    catalog.unshift(newProd);
    await db_upsertCatalogItem(newProd);
    render();
}

async function confirmDeleteCatalogItem(idx) {
    const prod = catalog[idx];
    if (confirm(`ATENȚIE: Ștergerea produsului "${prod.nume}" din catalog îl va elimina din toate calculele. Continui?`)) {
        await db_deleteCatalogItem(prod.id);
        catalog.splice(idx, 1);
        render();
    }
}

// --- Rețete ---

async function toggleSelectReteta(rIdx, checked) {
    rețete[rIdx].selectat = checked;
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function updateRetetaField(rIdx, field, value) {
    rețete[rIdx][field] = value;
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function addIngredient(rIdx) {
    rețete[rIdx].ingrediente.push({ idProd: null, qty: 1 });
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function addRecipe() {
    const newReteta = {
        id: Date.now(), // ID temporar local; înlocuit cu cel de la Supabase după insert
        selectat: true,
        nume: 'Meniu Nou',
        ore: 1,
        portii: 1,
        ingrediente: [],
        tags: ''
    };
    rețete.push(newReteta);
    await db_upsertReteta(newReteta); // ID-ul local e înlocuit în obiect dacă USE_SUPABASE=true
    render();
}

async function confirmDeleteRecipe(idx) {
    const reteta = rețete[idx];
    if (confirm(`Ești sigur că vrei să ștergi "${reteta.nume}"?`)) {
        await db_deleteReteta(reteta.id);
        rețete.splice(idx, 1);
        render();
    }
}

async function confirmDeleteIngredient(rIdx, iIdx) {
    const ing = rețete[rIdx].ingrediente[iIdx];
    const produs = catalog.find(p => p.id === ing.idProd);

    if (produs) {
        if (confirm(`Ștergi ${produs.nume} din listă?`)) {
            rețete[rIdx].ingrediente.splice(iIdx, 1);
            await db_upsertReteta(rețete[rIdx]);
            render();
        }
    } else {
        rețete[rIdx].ingrediente.splice(iIdx, 1);
        await db_upsertReteta(rețete[rIdx]);
        render();
    }
}

// ============================================================
// PICKER-E (număr + produs)
// ============================================================

function openProductPicker(rIdx, iIdx) {
    activeCtx = { rIdx, iIdx };
    document.getElementById('picker-search').value = "";
    renderPickerOptions();
    document.getElementById('product-picker').classList.add('active');
}

function renderPickerOptions() {
    const container = document.getElementById('product-options');
    const searchVal = normalizeText(document.getElementById('picker-search').value);
    container.innerHTML = '';

    const filtrat = catalog
        .filter(p => normalizeText(p.nume).includes(searchVal))
        .sort((a, b) => a.pretLei - b.pretLei);

    filtrat.forEach(prod => {
        container.innerHTML += `
            <div onclick="selectProduct('${prod.id}')" class="w-full p-4 glass-card mb-2 flex justify-between items-center active:scale-[0.98] transition-transform cursor-pointer">
                <div>
                    <span class="block font-bold text-white text-base">${prod.nume}</span>
                    <span class="text-[10px] font-bold text-gray-500 uppercase">${prod.unit}</span>
                </div>
                <div class="text-right">
                    <span class="text-sm font-black text-purple-400">${prod.pretLei.toFixed(2)} lei</span>
                </div>
            </div>`;
    });
}

async function selectProduct(id) {
    rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].idProd = id;
    lastEditedId = rețete[activeCtx.rIdx].id;
    await db_upsertReteta(rețete[activeCtx.rIdx]);
    closeSheets();
    render();
}


async function setNum(val) {
    if (activeCtx.type === 'ore') rețete[activeCtx.rIdx].ore = val;
    if (activeCtx.type === 'portii') rețete[activeCtx.rIdx].portii = val;
    if (activeCtx.type === 'ingQty') rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].qty = val;

    lastEditedId = rețete[activeCtx.rIdx].id;
    await db_upsertReteta(rețete[activeCtx.rIdx]);
    closeSheets();
    render();
}

function closeSheets() {
    document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
}

// ============================================================
// INIT
// ============================================================

window.onload = async function () {
    await db_loadCatalog();
    await db_loadRetete();
    await db_loadNumPersoane(); // <--- Adaugă această linie
    render();
};

</script>
