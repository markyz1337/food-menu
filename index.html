<head>

    <title>GastroGlass HUD Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c084fc;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }


    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background: #020205;
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
    }

    #view-title {
        color: #ffffff !important;
        text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        display: block;
        opacity: 1;
    }

    .orb {
        position: fixed;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(192, 132, 252, 0.1) 0%, transparent 70%);
        z-index: -1; filter: blur(80px);
        animation: float 20s infinite alternate;
    }

    @keyframes float { from { transform: translate(-10%, -10%); } to { transform: translate(30%, 20%); } }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
    }

    .inactive { opacity: 0.95; transform: scale(0.99); filter: grayscale(1); }


/* Forțăm header-ul rețetei să fie mereu vizibil și colorat */
.glass-card.inactive .recipe-header {
    opacity: 1 !important;
    filter: none !important;
}

/* Opțional: păstrăm checkbox-ul clar */
.glass-card.inactive input[type="checkbox"] {
    opacity: 1;
}

/* Asigurăm că textul titlului rămâne alb */
.glass-card.inactive .recipe-title-input {
    color: white !important;
    -webkit-text-fill-color: white !important;
}



    .hud-status {
        position: fixed;
        right: 20px;
        bottom: 110px;
        padding: 10px 17px;
        background: rgba(15, 15, 20, 0.8);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(192, 132, 252, 0.4);
        border-radius: 26px;
        z-index: 900;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        border-left: 4px solid var(--primary);
    }


/* Stil unitar pentru toate foile de jos */
/* Modifică/Adaugă aceste reguli în CSS-ul tău */

.bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    /* Schimbă height: auto în: */
    height: 75vh; 
    background: rgba(10, 10, 15, 0.98);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-top: 1px solid var(--glass-border);
    z-index: 2000;
    transform: translateY(110%); 
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    border-radius: 32px 32px 0 0;
    display: flex; /* Ajută la alinierea scroll-ului */
    flex-direction: column;
}

/* Stil pentru selectorul care ocupă TOT ecranul */
.bottom-sheet.full { 
    height: 100vh !important; /* Tot ecranul */
    height: 100dvh !important; /* Dynamic Viewport Height pentru mobil (evită bug-ul cu bara de adrese) */
    top: 0;
    border-radius: 0; /* Scoatem colțurile rotunjite */
    background: #020205; /* Fundal solid ca să nu se vadă ce e în spate */
}

/* Ajustăm containerul de scroll să respire sub butonul de închidere */
#product-options {
    flex-grow: 1;
    overflow-y: auto;
    padding: 0 20px 120px 20px; /* Padding generos jos pentru butonul plutitor */
}

.bottom-sheet.active { 
    transform: translateY(0); 
}

/* Specificitate pentru Number Picker */
#number-picker {
    background: rgba(15, 15, 25, 0.95);
    border-top: 2px solid var(--primary);
    padding-bottom: env(safe-area-inset-bottom);
}

.num-key {
    height: 60px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    font-size: 1.25rem;
    font-weight: 700;
    transition: all 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efect de apăsare (Haptic feedback vizual) */
.num-key:active {
    background: var(--primary);
    color: black;
    transform: scale(0.92);
}
.num-key, .nav-btn, button {
    touch-action: manipulation;
}

    .tab-bar {
        position: fixed; bottom: 0; width: 100%;
        background: rgba(5, 5, 8, 0.95);
        backdrop-filter: blur(20px);
        display: flex; justify-content: space-around;
        padding: 15px 10px 35px;
        border-top: 1px solid var(--glass-border);
        z-index: 1000;
    }

    .nav-btn { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    .nav-btn.active { color: var(--primary); }

    /* Stil pentru inputul de căutare în catalog */
    .search-pill {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 15px;
        padding: 12px 20px;
        width: 100%;
        color: white;
        font-size: 14px;
        outline: none;
        transition: all 0.3s;
    }
    .search-pill:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }





#number-picker.active {
bottom: 0;
}



.num-key {
height: 55px; /* Puțin mai mic */
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.05);
transition: all 0.2s;
}


/* Asigură-te că lista are padding la final să nu fie acoperită de butonul plutitor */


#product-options {
padding-bottom: 80px;
scrollbar-width: none; /* Ascunde scrollbar-ul pe Firefox */
}

#product-options::-webkit-scrollbar {
display: none; /* Ascunde scrollbar-ul pe Chrome/Safari */
}

/* Stil pentru butonul plutitor de jos */
.bottom-sheet .absolute.bottom-6 button {
box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}


.bottom-sheet.active { 
bottom: 0 !important; 


}

/* === LOCK BUTTON === */
#lock-btn {
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 50%;
cursor: pointer;
transition: all 0.3s ease;
flex-shrink: 0;
}
#lock-btn:active { transform: scale(0.9); }
#lock-btn.unlocked {
background: rgba(192, 132, 252, 0.15);
border-color: rgba(192, 132, 252, 0.4);
}

/* Elemente vizibile doar când e deblocat */
.locked-only {
display: none !important;
}
body.unlocked .locked-only {
display: flex !important;
}
/* pentru elemente block */
.locked-only-block {
display: none !important;
}
body.unlocked .locked-only-block {
display: block !important;
}

/* Cantitate ingredient - vizibilă mereu, dar clickabilă doar deblocat */
.qty-btn-locked {
pointer-events: none;
opacity: 0.6;
}
body.unlocked .qty-btn-locked {
pointer-events: auto;
opacity: 1;
}

/* Ore/masă - vizibil mereu, clickabil doar deblocat */
.ore-locked {
pointer-events: none;
cursor: default;
}
body.unlocked .ore-locked {
pointer-events: auto;
cursor: pointer;
}

/* Preț catalog - read-only când blocat */
.pret-input-locked {
pointer-events: none;
}
body.unlocked .pret-input-locked {
pointer-events: auto;
}


</style>

let currentNumInput = "0";

function openNumPicker(rIdx, type, iIdx = null) {
    activeCtx = { rIdx, type, iIdx };
    currentNumInput = "0"; // Resetăm la fiecare deschidere
    
    // Setăm titlul și unitatea vizuală
    const title = document.getElementById('num-picker-title');
    const unitDisp = document.getElementById('num-unit-display');
    
    if(type === 'ingQty') {
        const prodId = rețete[rIdx].ingrediente[iIdx].idProd;
        const prod = catalog.find(p => p.id === prodId);
        title.innerText = "Cantitate Ingredient";
        unitDisp.innerText = prod ? prod.unit : 'unit';
    } else if(type === 'ore') {
        title.innerText = "Ore per Masă";
        unitDisp.innerText = "h";
    } else {
        title.innerText = "Număr Porții";
        unitDisp.innerText = "buc";
    }

    updateNumDisplay();
    document.getElementById('number-picker').classList.add('active');
}

function pressNum(val) {
    if (val === 'back') {
        currentNumInput = currentNumInput.length > 1 ? currentNumInput.slice(0, -1) : "0";
    } else if (val === '.') {
        if (!currentNumInput.includes('.')) currentNumInput += '.';
    } else {
        if (currentNumInput === "0") currentNumInput = val;
        else currentNumInput += val;
    }
    updateNumDisplay();
}

function updateNumDisplay() {
    document.getElementById('num-display').innerText = currentNumInput;
}

async function confirmNum() {
    const finalVal = parseFloat(currentNumInput) || 0;
    const ctx = activeCtx; // Salvăm contextul curent
    
    if (!ctx) return;

    // 1. Actualizare rapidă a datelor locale (în variabila rețete)
    if (ctx.type === 'ore') {
        rețete[ctx.rIdx].ore = finalVal;
    } else if (ctx.type === 'portii') {
        rețete[ctx.rIdx].portii = Math.round(finalVal);
    } else if (ctx.type === 'ingQty') {
        rețete[ctx.rIdx].ingrediente[ctx.iIdx].qty = finalVal;
    }

    // 2. Feedback Instantaneu: Închidem foaia și redesenăm UI-ul local
    lastEditedId = rețete[ctx.rIdx].id;
    closeSheets();
    render(); 

    // 3. Sincronizare în fundal: Trimitem către Supabase fără 'await' 
    // Astfel, dacă serverul e lent, utilizatorul nu simte delay-ul.
    if (USE_SUPABASE) {
        db_upsertReteta(rețete[ctx.rIdx]).catch(err => {
            console.error("Eroare la salvarea în fundal:", err);
            // Opțional: Poți reîncărca datele dacă salvarea a eșuat critic
        });
    }

    // 4. Resetăm input-ul pentru următoarea utilizare
    currentNumInput = "0";
}

async function db_loadCatalog() {
    if (!USE_SUPABASE) return;
    const { data, error } = await supabaseClient.from('catalog').select('*');
    console.log('📦 Catalog din Supabase:', data, 'Eroare:', error);
    if (error) { console.error('Eroare catalog:', error); return; }
    catalog = data.map(r => ({
        id: r.id,
        nume: r.nume,
        pretLei: parseFloat(r.pretLei),
        unit: r.unit
    }));
}





async function db_upsertCatalogItem(prod) {
    if (!USE_SUPABASE) return;
    const { data, error } = await supabaseClient.from('catalog').upsert({
        id: prod.id,
        nume: prod.nume,
        pretLei: prod.pretLei,
        unit: prod.unit
    }).select();
    if (error) {
        console.error('❌ Eroare salvare produs:', JSON.stringify(error, null, 2));
    } else {
        console.log('✅ Salvat cu succes:', data);
    }
}



async function db_loadRetete() {
    if (!USE_SUPABASE) return; // folosim datele locale
    const { data, error } = await supabaseClient.from('retete').select('*');
    if (error) { console.error('Eroare retete:', error); return; }
    rețete = data.map(r => ({
        id: r.id,
        nume: r.nume,
        ore: r.ore,
        portii: r.portii,
        tags: r.tags || '',
        selectat: r.selectat,
        ingrediente: r.ingrediente || []
    }));
}



async function db_deleteCatalogItem(id) {
    if (!USE_SUPABASE) return;
    const { error } = await supabaseClient.from('catalog').delete().eq('id', id);
    if (error) console.error('Eroare ștergere produs:', error);
}

async function db_upsertReteta(reteta) {
    if (!USE_SUPABASE) return;
    const payload = {
        nume: reteta.nume,
        ore: reteta.ore,
        portii: reteta.portii,
        tags: reteta.tags || '',
        selectat: reteta.selectat,
        ingrediente: reteta.ingrediente
    };
    // Dacă ID-ul e generat de Supabase (BIGINT IDENTITY), nu-l trimitem la INSERT
    if (typeof reteta.id === 'number' && reteta.id > 1000000000) {
        // ID generat local (timestamp) -- INSERT fără id, Supabase generează unul nou
        const { data, error } = await supabaseClient.from('retete').insert(payload).select().single();
        if (error) { console.error('Eroare inserare rețetă:', error); return; }
        // Actualizăm ID-ul local cu cel de la Supabase
        reteta.id = data.id;
    } else {
        // ID existent de la Supabase -- UPDATE
        const { error } = await supabaseClient.from('retete').update(payload).eq('id', reteta.id);
        if (error) console.error('Eroare update rețetă:', error);
    }
}

async function db_deleteReteta(id) {
    if (!USE_SUPABASE) return;
    // ID-urile locale (timestamp mare) nu există în DB, ignorăm
    if (typeof id === 'number' && id > 1000000000 && !USE_SUPABASE) return;
    const { error } = await supabaseClient.from('retete').delete().eq('id', id);
    if (error) console.error('Eroare ștergere rețetă:', error);
}

function toggleLock() {
    isUnlocked = !isUnlocked;
    const body = document.body;
    const btn = document.getElementById('lock-btn');
    const iconLocked = document.getElementById('icon-locked');
    const iconUnlocked = document.getElementById('icon-unlocked');

    if (isUnlocked) {
        body.classList.add('unlocked');
        btn.classList.add('unlocked');
        iconLocked.style.display = 'none';
        iconUnlocked.style.display = 'block';
    } else {
        body.classList.remove('unlocked');
        btn.classList.remove('unlocked');
        iconLocked.style.display = 'block';
        iconUnlocked.style.display = 'none';
    }
    render();
}

function openShoppingList() {
    const listContent = document.getElementById('shopping-list-content');
    const summaryCount = document.getElementById('shopping-summary-count');
    listContent.innerHTML = '';

    let cumparaturi = {};
    rețete.forEach(r => {
        if (r.selectat) {
            r.ingrediente.forEach(ing => {
                if (!ing.idProd) return;
                const qtyTotala = ing.qty * r.portii;
                if (cumparaturi[ing.idProd]) {
                    cumparaturi[ing.idProd] += qtyTotala;
                } else {
                    cumparaturi[ing.idProd] = qtyTotala;
                }
            });
        }
    });

    const keys = Object.keys(cumparaturi);
    summaryCount.innerText = `${keys.length} PRODUSE UNICE`;

    if (keys.length === 0) {
        listContent.innerHTML = '<p class="text-center text-gray-500 py-10 font-bold uppercase text-xs tracking-widest">Nicio rețetă selectată</p>';
    } else {
        keys.forEach(idProd => {
            const produs = catalog.find(p => p.id === idProd);
            if (!produs) return;
            const cantitate = cumparaturi[idProd];
            const pretTotalProdus = (produs.pretLei * cantitate);
            const pretEur = (pretTotalProdus / CURS).toFixed(2);

            listContent.innerHTML += `
                <div class="glass-card p-4 flex justify-between items-center border-l-4 border-purple-500">
                    <div>
                        <p class="font-bold text-white text-sm">${produs.nume}</p>
                        <p class="text-[10px] font-black text-gray-500 uppercase">${cantitate} ${produs.unit} × ${produs.pretLei} lei</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-white">${pretTotalProdus.toFixed(2)} LEI</p>
                        <p class="text-[10px] font-bold text-purple-400">${pretEur} €</p>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById('shopping-sheet').classList.add('active');
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ț/g, "t").replace(/ș/g, "s")
        .replace(/ă/g, "a").replace(/â/g, "a")
        .replace(/î/g, "i");
}

function updateSearch(val) {
    searchTerm = normalizeText(val);
    const clearBtn = document.getElementById('clear-search');
    if (val.length > 0) clearBtn.classList.remove('hidden');
    else clearBtn.classList.add('hidden');
    render();
}

function clearSearch() {
    const input = document.getElementById('main-search');
    input.value = "";
    updateSearch("");
    input.focus();
}

function switchTab(tab) {
    document.getElementById('page-home').classList.toggle('hidden', tab !== 'home');
    document.getElementById('page-catalog').classList.toggle('hidden', tab !== 'catalog');
    const searchBar = document.getElementById('search-container');
    if (searchBar) searchBar.classList.toggle('hidden', tab !== 'home');

    document.getElementById('nav-home').className = tab === 'home' ? 'nav-btn active' : 'nav-btn';
    document.getElementById('nav-catalog').className = tab === 'catalog' ? 'nav-btn active' : 'nav-btn';
    document.getElementById('view-title').innerText = tab === 'home' ? 'Planificator' : 'Catalog';
    render();
}

            if (p) costLeiMasa += (p.pretLei * ing.qty);
        });

        r.costEurCalculat = (costLeiMasa / CURS) * r.portii;
        r.totalOreCalculat = r.ore * r.portii;
        r.eficienta = r.costEurCalculat > 0 ? (r.totalOreCalculat / r.costEurCalculat) : 0;

// --- Catalog ---

async function updateCatalogField(cIdx, field, value) {
    catalog[cIdx][field] = value;
    await db_upsertCatalogItem(catalog[cIdx]);
    render();
}

async function addNewProductToCatalog() {
    const newProd = { id: 'c' + Date.now(), nume: 'Produs Nou', pretLei: 0, unit: 'Kg' };
    catalog.unshift(newProd);
    await db_upsertCatalogItem(newProd);
    render();
}

async function confirmDeleteCatalogItem(idx) {
    const prod = catalog[idx];
    if (confirm(`ATENȚIE: Ștergerea produsului "${prod.nume}" din catalog îl va elimina din toate calculele. Continui?`)) {
        await db_deleteCatalogItem(prod.id);
        catalog.splice(idx, 1);
        render();
    }
}

// --- Rețete ---

async function toggleSelectReteta(rIdx, checked) {
    rețete[rIdx].selectat = checked;
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function updateRetetaField(rIdx, field, value) {
    rețete[rIdx][field] = value;
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function addIngredient(rIdx) {
    rețete[rIdx].ingrediente.push({ idProd: null, qty: 1 });
    await db_upsertReteta(rețete[rIdx]);
    render();
}

async function addRecipe() {
    const newReteta = {
        id: Date.now(), // ID temporar local; înlocuit cu cel de la Supabase după insert
        selectat: true,
        nume: 'Meniu Nou',
        ore: 1,
        portii: 1,
        ingrediente: [],
        tags: ''
    };
    rețete.push(newReteta);
    await db_upsertReteta(newReteta); // ID-ul local e înlocuit în obiect dacă USE_SUPABASE=true
    render();
}

async function confirmDeleteRecipe(idx) {
    const reteta = rețete[idx];
    if (confirm(`Ești sigur că vrei să ștergi "${reteta.nume}"?`)) {
        await db_deleteReteta(reteta.id);
        rețete.splice(idx, 1);
        render();
    }
}

async function confirmDeleteIngredient(rIdx, iIdx) {
    const ing = rețete[rIdx].ingrediente[iIdx];
    const produs = catalog.find(p => p.id === ing.idProd);

    if (produs) {
        if (confirm(`Ștergi ${produs.nume} din listă?`)) {
            rețete[rIdx].ingrediente.splice(iIdx, 1);
            await db_upsertReteta(rețete[rIdx]);
            render();
        }
    } else {
        rețete[rIdx].ingrediente.splice(iIdx, 1);
        await db_upsertReteta(rețete[rIdx]);
        render();
    }
}

                <div>
                    <span class="block font-bold text-white text-base">${prod.nume}</span>
                    <span class="text-[10px] font-bold text-gray-500 uppercase">${prod.unit}</span>
                </div>
                <div class="text-right">
                    <span class="text-sm font-black text-purple-400">${prod.pretLei.toFixed(2)} lei</span>
                </div>
            </div>`;
    });
}

async function selectProduct(id) {
    rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].idProd = id;
    lastEditedId = rețete[activeCtx.rIdx].id;
    await db_upsertReteta(rețete[activeCtx.rIdx]);
    closeSheets();
    render();
}


async function setNum(val) {
    if (activeCtx.type === 'ore') rețete[activeCtx.rIdx].ore = val;
    if (activeCtx.type === 'portii') rețete[activeCtx.rIdx].portii = val;
    if (activeCtx.type === 'ingQty') rețete[activeCtx.rIdx].ingrediente[activeCtx.iIdx].qty = val;

    lastEditedId = rețete[activeCtx.rIdx].id;
    await db_upsertReteta(rețete[activeCtx.rIdx]);
    closeSheets();
    render();
}

function closeSheets() {
    document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
}

// ============================================================
// INIT
// ============================================================

window.onload = async function () {
    await db_loadCatalog();
    await db_loadRetete();
    render();
};

</script>
